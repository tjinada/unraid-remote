services:
  unraidpwa:
    build: .
    container_name: unraidpwa
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Pull every value (APP_*, JWT_SECRET, SSH_*, ALLOWED_ROOTS, VAPID_*) from .env
    env_file:
      - .env
    # Container-specific overrides (these win over .env)
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /data
    volumes:
      - ./data:/data
